<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 — MADE FOR YOU</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f6f4;--white:#fff;--border:#e0e6e0;--accent:#2d5a3d;--accent-l:#e8f0eb;--text:#1a1a1a;--muted:#888;--dim:#bbb;--error:#c0392b;--success:#27ae60;--warning:#e67e22;--info:#2980b9;--r:10px;--shadow:0 2px 12px rgba(0,0,0,0.06);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-weight:300;line-height:1.6;}
/* SIDEBAR */
.sidebar{position:fixed;top:0;left:0;bottom:0;width:220px;background:var(--accent);color:white;display:flex;flex-direction:column;z-index:10;}
.sidebar-logo{padding:1.5rem 1.25rem 1rem;border-bottom:1px solid rgba(255,255,255,0.15);}
.sidebar-logo div{font-size:1rem;font-weight:700;letter-spacing:0.05em;}
.sidebar-logo small{font-size:0.65rem;opacity:0.7;letter-spacing:0.1em;}
.sidebar-nav{padding:1rem 0;flex:1;}
.snav{display:block;padding:10px 1.25rem;font-size:0.84rem;color:rgba(255,255,255,0.75);cursor:pointer;transition:all 0.15s;border:none;background:none;width:100%;text-align:left;font-family:inherit;}
.snav:hover,.snav.active{background:rgba(255,255,255,0.12);color:white;}
.snav .icon{margin-right:8px;}
.sidebar-foot{padding:1rem 1.25rem;border-top:1px solid rgba(255,255,255,0.15);font-size:0.75rem;opacity:0.6;}
/* MAIN */
.main{margin-left:220px;min-height:100vh;padding:2rem;}
/* TOP */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;}
.page-title{font-size:1.3rem;font-weight:700;}
.page-title span{color:var(--accent);}
/* CARDS */
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1rem;margin-bottom:2rem;}
.stat{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;box-shadow:var(--shadow);}
.stat-l{font-size:0.7rem;font-weight:500;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px;}
.stat-v{font-size:1.8rem;font-weight:700;color:var(--accent);}
.stat-s{font-size:0.72rem;color:var(--dim);margin-top:3px;}
/* CARD BOX */
.box{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;margin-bottom:1.5rem;box-shadow:var(--shadow);}
.box-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:1px solid var(--border);}
.box-title{font-size:0.85rem;font-weight:700;}
/* FORMS */
.fg{margin-bottom:0.9rem;}
.fg label{display:block;font-size:0.72rem;font-weight:500;color:var(--muted);margin-bottom:4px;letter-spacing:0.05em;}
.fg input,.fg select,.fg textarea{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:9px 11px;border-radius:7px;font-family:inherit;font-size:0.85rem;outline:none;transition:border-color 0.2s;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent);background:var(--white);}
.fg textarea{resize:vertical;min-height:64px;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 20px;border-radius:7px;font-family:inherit;font-size:0.82rem;font-weight:500;cursor:pointer;border:none;transition:all 0.2s;}
.btn-primary{background:var(--accent);color:white;}
.btn-primary:hover{background:#234830;}
.btn-outline{background:var(--white);color:var(--text);border:1px solid var(--border);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);}
.btn-danger{background:#fdedec;color:var(--error);border:1px solid #f1948a;}
.btn-danger:hover{background:var(--error);color:white;}
.btn-sm{padding:5px 12px;font-size:0.76rem;}
/* TABLE */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:0.83rem;}
thead th{text-align:left;padding:8px 12px;font-size:0.7rem;font-weight:500;color:var(--muted);border-bottom:2px solid var(--border);letter-spacing:0.07em;white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--border);transition:background 0.15s;}
tbody tr:hover{background:var(--bg);}
tbody td{padding:10px 12px;vertical-align:middle;}
.oid{font-family:monospace;font-size:0.74rem;color:var(--muted);}
/* STATUS SELECT */
.ss{background:var(--white);border:1px solid var(--border);color:var(--text);padding:5px 9px;border-radius:6px;font-family:inherit;font-size:0.78rem;outline:none;cursor:pointer;}
.ss:focus{border-color:var(--accent);}
/* BADGE */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:0.7rem;font-weight:500;}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;}
.b-pending{background:#fef9ec;color:#e67e22;border:1px solid #f5d78e;}.b-pending::before{background:#e67e22;}
.b-making{background:#eaf4fb;color:#2980b9;border:1px solid #aed6f1;}.b-making::before{background:#2980b9;animation:pulse 1.5s infinite;}
.b-shipping{background:#e8f0eb;color:#2d5a3d;border:1px solid #a9cbb4;}.b-shipping::before{background:#2d5a3d;animation:pulse 1.5s infinite;}
.b-done{background:#eafaf1;color:#27ae60;border:1px solid #a9dfbf;}.b-done::before{background:#27ae60;}
.b-cancelled{background:#fdedec;color:#c0392b;border:1px solid #f1948a;}.b-cancelled::before{background:#c0392b;}
/* MODAL */
.overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.4);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:1rem;}
.overlay.open{display:flex;animation:fi 0.2s;}
.modal{background:var(--white);border-radius:var(--r);width:100%;max-width:500px;max-height:90vh;overflow-y:auto;animation:su 0.25s;}
.mhead{padding:1.2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--white);z-index:1;}
.mhead h3{font-size:0.95rem;font-weight:700;}
.xbtn{background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--muted);padding:2px 6px;border-radius:6px;}
.xbtn:hover{background:var(--bg);color:var(--text);}
.mbody{padding:1.2rem;}
/* PRODUCT EDIT IMAGE */
.img-preview{width:100%;height:160px;border:2px dashed var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:0.8rem;overflow:hidden;background:var(--bg);}
.img-preview img{width:100%;height:100%;object-fit:cover;}
.img-preview .ph{font-size:3rem;color:var(--dim);}
/* PRODUCT GRID (admin) */
.pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem;}
.pc{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);}
.pc-img{height:140px;display:flex;align-items:center;justify-content:center;font-size:3rem;background:var(--accent-l);overflow:hidden;}
.pc-img img{width:100%;height:100%;object-fit:cover;}
.pc-body{padding:1rem;}
.pc-name{font-size:0.9rem;font-weight:700;margin-bottom:2px;}
.pc-price{font-size:0.85rem;color:var(--accent);font-weight:700;margin-bottom:0.8rem;}
.pc-acts{display:flex;gap:6px;}
/* FILTER */
.fr{display:flex;gap:0.8rem;align-items:flex-end;flex-wrap:wrap;margin-bottom:1.25rem;}
.fr label{font-size:0.7rem;color:var(--muted);display:block;margin-bottom:3px;}
.fr input[type=date],.fr select{background:var(--white);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:7px;font-family:inherit;font-size:0.8rem;outline:none;}
.fr input[type=date]:focus,.fr select:focus{border-color:var(--accent);}
/* LOADING */
.loading{text-align:center;padding:2rem;color:var(--muted);font-size:0.84rem;}
.spin{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}
.empty{text-align:center;padding:2.5rem;color:var(--dim);}
.empty .ei{font-size:2.2rem;margin-bottom:0.6rem;}
/* MISC */
.divider{border:none;border-top:1px solid var(--border);margin:1rem 0;}
.text-sm{font-size:0.78rem;color:var(--muted);}
.alert{padding:9px 13px;border-radius:7px;font-size:0.78rem;margin-bottom:0.8rem;display:none;}
.alert.show{display:block;}
.a-err{background:#fdedec;border:1px solid #f1948a;color:var(--error);}
.a-ok{background:#eafaf1;border:1px solid #a9dfbf;color:var(--success);}
/* TOAST */
.tc{position:fixed;bottom:1.5rem;right:1.5rem;z-index:999;display:flex;flex-direction:column;gap:6px;}
.t{background:var(--white);border:1px solid var(--border);border-radius:7px;padding:9px 15px;font-size:0.8rem;box-shadow:0 4px 20px rgba(0,0,0,0.12);display:flex;align-items:center;gap:7px;min-width:200px;animation:su 0.25s;}
.t.ok{border-left:3px solid var(--success);}
.t.err{border-left:3px solid var(--error);}
@keyframes fo{to{opacity:0;transform:translateX(10px)}}
.tout{animation:fo 0.25s forwards;}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes su{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
/* LOGIN PAGE */
#login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);}
.login-box{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:2rem;width:360px;box-shadow:var(--shadow);}
.login-logo{text-align:center;margin-bottom:1.5rem;}
.login-logo div{font-size:1.1rem;font-weight:700;color:var(--accent);}
.login-logo small{font-size:0.7rem;color:var(--muted);}
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="login-page">
  <div class="login-box">
    <div class="login-logo"><div>MADE FOR YOU</div><small>관리자 로그인</small></div>
    <div class="alert a-err" id="adm-err"></div>
    <div class="fg"><label>관리자 이메일</label><input type="email" id="a-email" placeholder="admin@example.com"></div>
    <div class="fg"><label>비밀번호</label><input type="password" id="a-pw" placeholder="비밀번호" onkeydown="if(event.key==='Enter')adminLogin()"></div>
    <button class="btn btn-primary" style="width:100%;margin-top:0.5rem;justify-content:center" onclick="adminLogin()" id="adm-login-btn">로그인</button>
  </div>
</div>

<!-- MAIN ADMIN (hidden until login) -->
<div id="admin-wrap" style="display:none">
  <div class="sidebar">
    <div class="sidebar-logo"><div>MADE FOR YOU</div><small>ADMIN PANEL</small></div>
    <div class="sidebar-nav">
      <button class="snav active" onclick="showTab('dashboard')" id="sn-dashboard"><span class="icon">📊</span>대시보드</button>
      <button class="snav" onclick="showTab('orders')" id="sn-orders"><span class="icon">📦</span>주문 관리</button>
      <button class="snav" onclick="showTab('products')" id="sn-products"><span class="icon">🛍️</span>상품 관리</button>
      <button class="snav" onclick="showTab('users')" id="sn-users"><span class="icon">👥</span>회원 관리</button>
    </div>
    <div class="sidebar-foot" id="adm-user-info">관리자</div>
  </div>

  <div class="main">
    <!-- DASHBOARD -->
    <div id="tab-dashboard">
      <div class="topbar"><div class="page-title">대시 <span>보드</span></div></div>
      <div class="stats" id="adm-stats">
        <div class="loading"><span class="spin"></span>로딩 중...</div>
      </div>
      <div class="box">
        <div class="box-head"><div class="box-title">최근 주문 10건</div></div>
        <div id="recent-orders"><div class="loading"><span class="spin"></span></div></div>
      </div>
    </div>

    <!-- ORDERS -->
    <div id="tab-orders" style="display:none">
      <div class="topbar"><div class="page-title">주문 <span>관리</span></div></div>
      <div class="box">
        <div class="fr">
          <div><label>시작일</label><input type="date" id="af"></div>
          <div><label>종료일</label><input type="date" id="at"></div>
          <div><label>상태</label>
            <select id="asf" onchange="loadAllOrders()">
              <option value="">전체</option>
              <option value="pending">결제대기</option>
              <option value="making">제작중</option>
              <option value="shipping">배송중</option>
              <option value="done">완료</option>
              <option value="cancelled">취소</option>
            </select>
          </div>
          <button class="btn btn-outline btn-sm" style="margin-top:18px" onclick="loadAllOrders()">검색</button>
          <button class="btn btn-outline btn-sm" style="margin-top:18px" onclick="exportCSV()">CSV 내보내기</button>
        </div>
        <div id="all-orders-wrap"><div class="loading"><span class="spin"></span></div></div>
      </div>
    </div>

    <!-- PRODUCTS -->
    <div id="tab-products" style="display:none">
      <div class="topbar">
        <div class="page-title">상품 <span>관리</span></div>
        <button class="btn btn-primary" onclick="openProductModal()">+ 상품 추가</button>
      </div>
      <div id="products-grid" class="pg"><div class="loading"><span class="spin"></span></div></div>
    </div>

    <!-- USERS -->
    <div id="tab-users" style="display:none">
      <div class="topbar"><div class="page-title">회원 <span>관리</span></div></div>
      <div class="box">
        <div id="users-wrap"><div class="loading"><span class="spin"></span></div></div>
      </div>
    </div>
  </div>
</div>

<!-- PRODUCT MODAL -->
<div class="overlay" id="m-product">
  <div class="modal">
    <div class="mhead"><h3 id="pm-title">상품 추가</h3><button class="xbtn" onclick="closeM('m-product')">✕</button></div>
    <div class="mbody">
      <input type="hidden" id="pm-id">
      <div class="fg">
        <label>상품 이미지</label>
        <div class="img-preview" id="pm-img-preview">
          <div class="ph">🖼️</div>
        </div>
        <input type="text" id="pm-imgurl" placeholder="이미지 URL 입력 (또는 아래에서 직접 업로드)" oninput="previewImg()">
        <div style="margin-top:6px;font-size:0.72rem;color:var(--muted)">또는 파일 업로드:</div>
        <input type="file" id="pm-imgfile" accept="image/*" onchange="handleImgUpload()" style="margin-top:4px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:0.78rem;width:100%">
      </div>
      <div class="frow">
        <div class="fg"><label>상품명 *</label><input type="text" id="pm-name" placeholder="상품명 입력"></div>
        <div class="fg"><label>가격 *</label><input type="number" id="pm-price" placeholder="0"></div>
      </div>
      <div class="fg"><label>설명</label><textarea id="pm-desc" placeholder="상품 설명"></textarea></div>
      <div class="frow">
        <div class="fg"><label>이모지 아이콘</label><input type="text" id="pm-icon" placeholder="🎁"></div>
        <div class="fg"><label>카테고리</label><input type="text" id="pm-cat" placeholder="인쇄, 자수 등"></div>
      </div>
      <div class="fg">
        <label>상품 상태</label>
        <select id="pm-active">
          <option value="1">판매중</option>
          <option value="0">숨김</option>
        </select>
      </div>
      <div style="display:flex;gap:0.8rem;margin-top:1rem">
        <button class="btn btn-outline" style="flex:1" onclick="closeM('m-product')">취소</button>
        <button class="btn btn-primary" style="flex:2" onclick="saveProduct()" id="pm-save">저장</button>
      </div>
    </div>
  </div>
</div>

<!-- ORDER DETAIL MODAL -->
<div class="overlay" id="m-odetail">
  <div class="modal">
    <div class="mhead"><h3>주문 상세</h3><button class="xbtn" onclick="closeM('m-odetail')">✕</button></div>
    <div class="mbody" id="odetail-body"></div>
  </div>
</div>

<div class="tc" id="tc"></div>

<script>
const API = 'YOUR_APPS_SCRIPT_URL_HERE';
let adminUser = null;
let allOrdersCache = [];
let allProductsCache = [];

async function apicall(action, data={}) {
  try {
    const r = await fetch(API, { method:'POST', body:JSON.stringify({action,...data}) });
    return await r.json();
  } catch(e) { return {ok:false,error:'서버 오류'}; }
}

// ============================
// ADMIN LOGIN
// ============================
async function adminLogin() {
  const email = document.getElementById('a-email').value.trim();
  const pw = document.getElementById('a-pw').value;
  if(!email||!pw) { showA('adm-err','이메일과 비밀번호를 입력해주세요'); return; }
  setL('adm-login-btn',true);
  const r = await apicall('login', {email, pw});
  setL('adm-login-btn',false);
  if(!r.ok || r.user?.role !== 'admin') { showA('adm-err', r.error||'관리자 계정이 아닙니다'); return; }
  adminUser = r.user;
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('admin-wrap').style.display = 'block';
  document.getElementById('adm-user-info').textContent = adminUser.name + ' (관리자)';
  loadDashboard();
}

// ============================
// DASHBOARD
// ============================
async function loadDashboard() {
  const r = await apicall('getStats');
  if(r.ok) {
    const s = r.data;
    document.getElementById('adm-stats').innerHTML = [
      {l:'전체 주문',v:s.total+'건',s:'누적'},
      {l:'제작중',v:s.making+'건',s:'진행'},
      {l:'배송중',v:s.shipping+'건',s:'배송'},
      {l:'총 매출',v:Number(s.revenue).toLocaleString()+'원',s:'취소제외'},
      {l:'회원수',v:s.users+'명',s:'가입'},
    ].map(x=>`<div class="stat"><div class="stat-l">${x.l}</div><div class="stat-v">${x.v}</div><div class="stat-s">${x.s}</div></div>`).join('');
  }
  const r2 = await apicall('getAllOrders', {limit:10});
  if(r2.ok) renderOrderTable('recent-orders', r2.data, false);
}

// ============================
// ORDERS
// ============================
async function loadAllOrders() {
  document.getElementById('all-orders-wrap').innerHTML = '<div class="loading"><span class="spin"></span></div>';
  const r = await apicall('getAllOrders', {
    from:document.getElementById('af').value,
    to:document.getElementById('at').value,
    status:document.getElementById('asf').value
  });
  if(!r.ok){ document.getElementById('all-orders-wrap').innerHTML='<div class="empty"><div class="ei">⚠️</div><p>불러오기 실패</p></div>'; return; }
  allOrdersCache = r.data;
  renderOrderTable('all-orders-wrap', r.data, true);
}

function renderOrderTable(elId, orders) {
  if(!orders.length){ document.getElementById(elId).innerHTML='<div class="empty"><div class="ei">📦</div><p>주문 없음</p></div>'; return; }
  let rows = '';
  orders.forEach(function(o) {
    const opts = ['pending','making','shipping','done','cancelled'].map(function(s){
      return '<option value="'+s+'"'+(o.status===s?' selected':'')+'>'+sl(s)+'</option>';
    }).join('');
    const safeO = JSON.stringify(o).replace(/'/g,"&#39;");
    rows += '<tr>'
      + '<td class="oid">'+o.id+'</td>'
      + '<td style="white-space:nowrap">'+o.createdAt+'</td>'
      + '<td>'+(o.userName||'-')+'</td>'
      + '<td>'+o.productName+' x'+o.qty+'</td>'
      + '<td style="font-weight:700;color:var(--accent)">'+(Number(o.price)*Number(o.qty)+3000).toLocaleString()+'원</td>'
      + '<td><select class="ss" onchange="updateStatus(''+o.id+'',this.value)">'+opts+'</select></td>'
      + '<td><button class="btn btn-outline btn-sm" onclick="openODetail(JSON.parse(this.dataset.o))" data-o=''+safeO+''>상세</button></td>'
      + '</tr>';
  });
  document.getElementById(elId).innerHTML = '<div class="tbl-wrap"><table>'
    + '<thead><tr><th>주문번호</th><th>날짜</th><th>고객</th><th>상품</th><th>금액</th><th>상태 변경</th><th></th></tr></thead>'
    + '<tbody>'+rows+'</tbody></table></div>';
}

async function updateStatus(orderId, status) {
  const r = await apicall('updateOrderStatus', {orderId, status});
  if(r.ok){ toast('상태 변경 완료 ✓', 'ok'); }
  else{ toast('변경 실패: '+r.error, 'err'); loadAllOrders(); }
}

function openODetail(o) {
  document.getElementById('odetail-body').innerHTML = `
    ${dr('주문번호',`<span style="font-family:monospace">${o.id}</span>`)}
    ${dr('주문일',o.createdAt)}
    ${dr('고객명',o.userName||'-')}
    ${dr('연락처',o.userPhone||'-')}
    ${dr('상품',o.productName)}
    ${dr('수량',o.qty+'개')}
    ${dr('금액',(Number(o.price)*Number(o.qty)+3000).toLocaleString()+'원')}
    ${dr('배송지',o.addr||'-')}
    ${o.memo?dr('요청사항',o.memo):''}
    ${o.files?dr('첨부파일',o.files):''}
    ${dr('상태',badge(o.status))}
    ${o.driveLink?dr('드라이브 파일',`<a href="${o.driveLink}" target="_blank" style="color:var(--accent)">파일 보기 →</a>`):''}
    <div style="margin-top:1.2rem">
      <label style="font-size:0.72rem;color:var(--muted);display:block;margin-bottom:6px">상태 변경</label>
      <select class="ss" id="detail-status-sel" style="width:100%;padding:8px">
        ${['pending','making','shipping','done','cancelled'].map(s=>`<option value="${s}"${o.status===s?' selected':''}>${sl(s)}</option>`).join('')}
      </select>
      <button class="btn btn-primary" style="width:100%;margin-top:0.6rem;justify-content:center" onclick="updateStatus('${o.id}',document.getElementById('detail-status-sel').value);closeM('m-odetail')">저장</button>
    </div>`;
  openM('m-odetail');
}

function exportCSV() {
  if(!allOrdersCache.length){ toast('데이터 없음','err'); return; }
  const h = ['주문번호','날짜','고객명','연락처','상품명','수량','금액','배송지','요청사항','상태'];
  const rows = allOrdersCache.map(o=>[o.id,o.createdAt,o.userName,o.userPhone,o.productName,o.qty,(Number(o.price)*Number(o.qty)+3000),o.addr,o.memo||'',sl(o.status)]);
  const csv = [h,...rows].map(r=>r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `orders_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  toast('CSV 다운로드 완료', 'ok');
}

// ============================
// PRODUCTS
// ============================
async function loadProducts() {
  document.getElementById('products-grid').innerHTML = '<div class="loading"><span class="spin"></span></div>';
  const r = await apicall('getProducts');
  allProductsCache = r.ok ? r.data : [];
  renderProductGrid();
}

function renderProductGrid() {
  if(!allProductsCache.length){ document.getElementById('products-grid').innerHTML='<div class="empty"><div class="ei">🛍️</div><p>상품 없음</p></div>'; return; }
  document.getElementById('products-grid').innerHTML = allProductsCache.map(p=>`
    <div class="pc">
      <div class="pc-img">${p.imageUrl?`<img src="${p.imageUrl}" onerror="this.style.display='none'">`:(p.icon||'🎁')}</div>
      <div class="pc-body">
        <div class="pc-name">${p.name}</div>
        <div class="pc-price">${Number(p.price).toLocaleString()}원~</div>
        <div class="pc-acts">
          <button class="btn btn-outline btn-sm" onclick='openProductModal(${JSON.stringify(p)})'>✏️ 수정</button>
          <button class="btn btn-danger btn-sm" onclick="deleteProduct('${p.id}','${p.name}')">삭제</button>
        </div>
      </div>
    </div>`).join('');
}

function openProductModal(p=null) {
  document.getElementById('pm-title').textContent = p ? '상품 수정' : '상품 추가';
  document.getElementById('pm-id').value = p?.id||'';
  document.getElementById('pm-name').value = p?.name||'';
  document.getElementById('pm-price').value = p?.price||'';
  document.getElementById('pm-desc').value = p?.desc||'';
  document.getElementById('pm-icon').value = p?.icon||'';
  document.getElementById('pm-cat').value = p?.category||'';
  document.getElementById('pm-imgurl').value = p?.imageUrl||'';
  document.getElementById('pm-active').value = p?.active||'1';
  previewImg(p?.imageUrl);
  openM('m-product');
}

function previewImg(url) {
  const u = url || document.getElementById('pm-imgurl').value;
  const el = document.getElementById('pm-img-preview');
  el.innerHTML = u ? `<img src="${u}" onerror="this.parentNode.innerHTML='<div class=ph>⚠️</div>'">` : '<div class="ph">🖼️</div>';
}

async function handleImgUpload() {
  const file = document.getElementById('pm-imgfile').files[0];
  if(!file) return;
  if(file.size > 5*1024*1024) { toast('5MB 이하 이미지만 가능','err'); return; }
  const b64 = await toB64(file);
  setL('pm-save', true, '업로드 중...');
  const r = await apicall('uploadImage', {name: file.name, type: file.type, data: b64});
  setL('pm-save', false);
  if(r.ok) {
    document.getElementById('pm-imgurl').value = r.url;
    previewImg(r.url);
    toast('이미지 업로드 완료', 'ok');
  } else { toast('업로드 실패: '+r.error, 'err'); }
}

async function saveProduct() {
  const id = document.getElementById('pm-id').value;
  const name = document.getElementById('pm-name').value.trim();
  const price = document.getElementById('pm-price').value;
  if(!name||!price) { toast('상품명과 가격을 입력해주세요','err'); return; }
  setL('pm-save', true);
  const data = {
    id: id||('p'+Date.now()),
    name, price: Number(price),
    desc: document.getElementById('pm-desc').value,
    icon: document.getElementById('pm-icon').value,
    category: document.getElementById('pm-cat').value,
    imageUrl: document.getElementById('pm-imgurl').value,
    active: document.getElementById('pm-active').value,
  };
  const r = await apicall(id?'updateProduct':'addProduct', data);
  setL('pm-save', false);
  if(!r.ok) { toast('저장 실패: '+r.error,'err'); return; }
  toast('상품 저장 완료','ok');
  closeM('m-product');
  loadProducts();
}

async function deleteProduct(id, name) {
  if(!confirm(`"${name}" 상품을 삭제하시겠습니까?`)) return;
  const r = await apicall('deleteProduct', {id});
  if(r.ok){ toast('삭제 완료','ok'); loadProducts(); }
  else toast('삭제 실패','err');
}

// ============================
// USERS
// ============================
async function loadUsers() {
  document.getElementById('users-wrap').innerHTML = '<div class="loading"><span class="spin"></span></div>';
  const r = await apicall('getAllUsers');
  if(!r.ok){ document.getElementById('users-wrap').innerHTML='<div class="empty"><p>불러오기 실패</p></div>'; return; }
  const users = r.data.filter(u=>u.role!=='admin');
  document.getElementById('users-wrap').innerHTML = `<div class="tbl-wrap"><table>
    <thead><tr><th>이름</th><th>이메일</th><th>연락처</th><th>가입일</th><th>주문수</th></tr></thead>
    <tbody>${users.map(u=>`<tr>
      <td>${u.name}</td><td>${u.email}</td><td>${u.phone}</td>
      <td>${u.createdAt||'-'}</td><td>${u.orderCount||0}건</td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

// ============================
// TAB NAV
// ============================
function showTab(t) {
  ['dashboard','orders','products','users'].forEach(n=>{
    document.getElementById('tab-'+n).style.display = n===t?'block':'none';
    document.getElementById('sn-'+n).classList.toggle('active',n===t);
  });
  if(t==='orders') loadAllOrders();
  if(t==='products') loadProducts();
  if(t==='users') loadUsers();
}

// ============================
// UTILS
// ============================
function toB64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});}
function openM(id){document.getElementById(id).classList.add('open');}
function closeM(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)closeM(o.id);}));
function showA(id,msg){const e=document.getElementById(id);e.textContent=msg;e.classList.add('show');}
const sm={pending:'결제대기',making:'제작중',shipping:'배송중',done:'완료',cancelled:'취소'};
function sl(s){return sm[s]||s;}
function badge(s){return `<span class="badge b-${s}">${sl(s)}</span>`;}
function dr(l,v){return `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:0.83rem"><span style="color:var(--muted)">${l}</span><span style="text-align:right;max-width:65%">${v}</span></div>`;}
function setL(id,on,txt=''){const b=document.getElementById(id);if(!b)return;b.disabled=on;if(on&&txt){if(!b.dataset.orig)b.dataset.orig=b.textContent;b.textContent=txt;}else if(!on&&b.dataset.orig){b.textContent=b.dataset.orig;}}
function toast(msg,type='ok'){const c=document.getElementById('tc');const t=document.createElement('div');t.className=`t ${type}`;t.innerHTML=`<span>${type==='ok'?'✓':'✕'}</span>${msg}`;c.appendChild(t);setTimeout(()=>{t.classList.add('tout');setTimeout(()=>t.remove(),300);},3000);}
</script>
